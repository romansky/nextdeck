name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
      publish:
        description: "Publish the GitHub release and Homebrew tap update"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: sigstore/cosign-installer@v3
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release artifact
        run: cargo xtask tui-release --version "${{ steps.version.outputs.value }}" --target "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            target/dist/nextdeck-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz
            target/dist/nextdeck-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz.sha256
            target/dist/nextdeck-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz.sigstore.json
            target/dist/nextdeck-v${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz.sha256.sigstore.json

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' || inputs.publish
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: nextdeck ${{ steps.version.outputs.value }}
          files: release-artifacts/*
          fail_on_unmatched_files: true

  homebrew:
    name: Homebrew Tap
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: (github.event_name == 'push' || inputs.publish) && vars.HOMEBREW_TAP != ''
    steps:
      - uses: actions/checkout@v4
        with:
          path: nextdeck
      - uses: actions/download-artifact@v4
        with:
          path: nextdeck/target/dist
          merge-multiple: true
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate formula
        working-directory: nextdeck
        run: |
          cargo xtask tui-homebrew-formula \
            --version "${{ steps.version.outputs.value }}" \
            --github-repo "${{ github.repository }}" \
            --dist-dir target/dist \
            --output ../homebrew-tap/Formula/nextdeck.rb
      - name: Commit formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/nextdeck.rb
          git commit -m "Update nextdeck to ${{ steps.version.outputs.value }}"
          git push
