name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --all --check
        if: runner.os == 'Linux'
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        if: runner.os == 'Linux'
      - run: cargo test --workspace --all-features
      - run: cargo xtask lib-publish-local
        if: runner.os == 'Linux'
