name: Support question
description: Ask how to use Nextdeck when the documentation is unclear
title: "[Support]: "
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include the relevant workspace setup and Nextdeck workflow.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nextdeck version
      description: Paste the output of `nextdeck --version` when applicable.
  - type: textarea
    id: documentation
    attributes:
      label: Documentation checked
      description: Which guide or interface text did not answer the question?
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This is a usage question, not a bug report or feature request.
          required: true
