name: Bug report
description: Report behavior that is incorrect or has regressed
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nextdeck version
      description: Paste the output of `nextdeck --version`.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Include the operating system, architecture, and terminal.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence of steps.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Add relevant output or a scrubbed `~/.nextdeck/debug.log` excerpt.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I checked for an existing issue describing this problem.
          required: true
        - label: I removed sensitive information from logs and output.
          required: true
