name: Troubleshooting
description: Get help diagnosing a Nextdeck setup or integration problem
title: "[Troubleshooting]: "
body:
  - type: markdown
    attributes:
      value: Read the troubleshooting guide before submitting this form.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe where the workflow stops and any visible error.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Nextdeck version
      description: Paste the output of `nextdeck --version`.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Include the operating system, architecture, and terminal.
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Commands checked
      description: Include results from the relevant Cargo, Nextest, or xtask command outside Nextdeck.
      render: text
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostic log
      description: Add the smallest relevant, scrubbed excerpt from `~/.nextdeck/debug.log`.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed sensitive information from logs and output.
          required: true
